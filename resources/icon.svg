<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Card shape -->
  <rect x="312" y="162" width="400" height="560" rx="24" fill="#ffffff" stroke="url(#gold)" stroke-width="8"/>
  <!-- Question mark (the mystery rule) -->
  <text x="512" y="520" text-anchor="middle" font-family="serif" font-size="320" font-weight="bold" fill="#8a2be2">?</text>
  <!-- Title text -->
  <text x="512" y="850" text-anchor="middle" font-family="monospace" font-size="64" font-weight="bold" fill="url(#gold)">NEW ELEUSIS</text>
</svg>
